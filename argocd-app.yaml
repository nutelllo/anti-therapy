apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: anti-therapy-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/nutelllo/anti-therapy.git'
    targetRevision: master # У тебя в логах была ветка master
    path: charts # <--- Указываем папку, где лежит Chart.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true