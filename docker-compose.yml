version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: therapy_ollama
    ports:
      - "11434:11434"
    volumes:
      # Подключаем наш старый volume с уже скачанной моделью dolphin-mistral
      - ollama:/root/.ollama 
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: therapy_backend
    ports:
      - "8000:8000"
    environment:
      # Бэкенд будет стучаться к контейнеру ollama по его имени в сети докера
      - OLLAMA_URL=http://therapy_ollama:11434/api/generate
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: therapy_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama:
    external: true # Указываем, что этот volume уже существует на хосте
