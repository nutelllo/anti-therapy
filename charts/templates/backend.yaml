apiVersion: apps/v1
kind: Deployment
metadata:
  name: therapy-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: therapy-backend
  template:
    metadata:
      labels:
        app: therapy-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "{{ .Values.backend.ollamaUrl }}"
---
apiVersion: v1
kind: Service
metadata:
  name: therapy-backend
spec:
  selector:
    app: therapy-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
